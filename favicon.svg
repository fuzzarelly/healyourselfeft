<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Navy background -->
  <rect width="100" height="100" rx="18" fill="#1a3a5c"/>
  <!-- Hand in light blue -->
  <g fill="#5a9fd4">
    <!-- Index finger -->
    <rect x="27" y="20" width="10" height="37" rx="5"/>
    <!-- Middle finger (tallest) -->
    <rect x="40" y="14" width="10" height="43" rx="5"/>
    <!-- Ring finger -->
    <rect x="53" y="20" width="10" height="37" rx="5"/>
    <!-- Pinky (shortest) -->
    <rect x="66" y="28" width="8" height="29" rx="4"/>
    <!-- Palm -->
    <rect x="21" y="50" width="55" height="30" rx="10"/>
    <!-- Thumb -->
    <rect x="9" y="52" width="20" height="9" rx="4.5"/>
    <circle cx="22" cy="57" r="8"/>
  </g>
</svg>
